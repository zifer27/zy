<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zyrex AI – Asisten Cerdas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <i class="fas fa-paw logo-icon"></i>
                <span class="logo-text">Zyrex AI</span>
            </div>
            <button id="newChatBtn" class="new-chat-btn"><i class="fas fa-plus"></i> Chat Baru</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="sidebar-footer">
            <button id="clearHistoryBtn" class="clear-history-btn"><i class="fas fa-trash-alt"></i> Hapus Riwayat</button>
        </div>
    </aside>

    <main id="mainChat">
        <header class="chat-header">
            <button id="toggleSidebarBtn" class="toggle-sidebar"><i class="fas fa-bars"></i></button>
            <div class="header-title"><i class="fas fa-paw"></i><span>Zyrex AI · Asisten Cerdas</span></div>
            <div class="header-actions">
                <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <div id="chatContainer">
            <div id="messages" class="messages"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Tanyakan apa saja..." autofocus />
                <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="input-hint"><span>Zyrex AI · backend: http://207.180.19.124:3529</span></div>
        </div>
    </main>

    <div id="codeModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <pre><code id="modalCode"></code></pre>
            <button id="copyCodeBtn" class="copy-code-btn"><i class="fas fa-copy"></i> Salin Kode</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
